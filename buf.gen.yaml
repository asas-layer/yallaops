version: v2
plugins:
  - remote: buf.build/protocolbuffers/go
    out: core/internal/gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: core/internal/gen
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
  # CLI gets its own copy of the generated client stubs — core/internal/gen
  # is unreachable from the cli module (Go internal package rules), and the
  # CLI only ever needs client code, never the server interfaces.
  - remote: buf.build/protocolbuffers/go
    out: cli/internal/gen
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go
    out: cli/internal/gen
    opt:
      - paths=source_relative
      - require_unimplemented_servers=false
